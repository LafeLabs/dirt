<html lang="en">

   <title>P5JS::HTML::PHP::JSON::PYTHON</title>

<body> 
<div id = "control-scroll">
    <main></main>
    <textarea id = "text-input"></textarea>
</div>
<div id = "data-scroll">
    <img id ="live-trace">
    <div id = "output-text"></div>
    <div id = "save-trace-button">SAVE PLOT</div>
    <div id = "plot-feed"></div>
</div>
<script>

pythonResponse = {
    "text":"",
    "data":{},
    "image":""
};

dirt = {
    "icon":[],
    "fft":[],
    "text":"",
    "mouse":{
        "x":0,
        "y":0,
        "z":0
    }
};

brushstroke = [];
thispoint = {};
thispoint.x = 0;//x position in units of 1/1024 of width
thispoint.y = 0;//y position in units of 1/1024 of height from top

let vnaImg = null;       // Will hold the processed p5.Image object
let isFetching = false;  // Your guard flag defined in the fetch function


function setup() {
    control_canvas_width = 0.48*innerWidth;
    createCanvas(control_canvas_width,control_canvas_width);  
    //frameRate(10);
    stroke(0);
    strokeWeight(20);
}


inLine = false;
function draw(){
    dirt.text = document.getElementById("text-input").value;
    stroke(0);
    strokeWeight(30);
    if(mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height){
      dirt.mouse.x = mouseX;
      dirt.mouse.y = mouseY;
      if (mouseIsPressed === true) {
        if(inLine == false){
            var  point = {};
            point.x = Math.round(1024*mouseX/width);
            point.y = Math.round(1024*mouseY/width);
            brushstroke.push(point);
        }
        line(mouseX, mouseY, pmouseX, pmouseY);
        inLine = true;
        if(mouseX != pmouseX || mouseY != pmouseY){
            var  point = {};
            point.x = Math.round(1024*mouseX/width);
            point.y = Math.round(1024*mouseY/width);
            brushstroke.push(point);
        }
      }
      else{
          if(inLine){
              dirt.icon.push(JSON.parse(JSON.stringify(brushstroke)));
              brushstroke = [];
          }
          inLine = false;
      }
    }
    
    if (!isFetching) {
        fetchSingleFrame();
    }
    
}


function mouseWheel(event) {
    if(mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height){
        if(event.delta > 0){ //mouse wheel down
            dirt.mouse.z--;
        }
        else{
            dirt.mouse.z++;
        }
    }
}

function fetchSingleFrame() {
    isFetching = true;
    const plotImg = document.getElementById('live-trace');
    
    fetch('bridge.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dirt) //send dirt 
    })
    .then(response => {
        if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
        return response.text(); 
    })
    .then(rawText => {
        const cleanText = rawText.trim();
        
        try {
            pythonResponse = JSON.parse(cleanText);
            document.getElementById("output-text").innerHTML = pythonResponse.text;
            if (pythonResponse?.image?.startsWith('data:image/png;base64,')) {
                plotImg.src = pythonResponse.image;
                plotImg.style.display = "block";
            } else throw new Error("Missing or invalid image data");
        } catch { throw new Error("Bad or malformed JSON payload"); }
        
        
    })
    .catch(error => {
        console.error('Test pipeline error:', error);
    })
    .finally(() => {
        // Release the guard so the p5 loop knows it can request the next frame
        isFetching = false; 
    });
}

document.getElementById("save-trace-button").onclick = function(){
    
    saveDirt();
    png64 = document.getElementById('live-trace').src;
    var newimg = document.createElement("IMG");
    document.getElementById("plot-feed").prepend(newimg);
    newimg.src = png64;
    var timestamp = Math.round((new Date().getTime())/1000).toString();
    var httpc = new XMLHttpRequest();
    var url = "save-png.php";        
    httpc.open("POST", url, true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(png64.substring(22))+"&filename=plots/plot-" + timestamp +  ".png");
    
    saveData = {};
    saveData.python_response_data = JSON.parse(JSON.stringify(pythonResponse.data));
    saveData.dirt = JSON.parse(JSON.stringify(dirt));
    
    saveData.python_response_text = pythonResponse.text
    
    saveData.javascript_metadata = {};
    saveData.javascript_metadata.timestamp = timestamp;
    saveData.javascript_metadata.filename = "data/data-" + timestamp + ".json";
    saveData.javascript_metadata.plotname = "plots/plot-" + timestamp + ".png";
    saveData.javascript_metadata.origin = "dirt.html";

    var httpcj = new XMLHttpRequest();
    var url = "save-file.php";        
    httpcj.open("POST", url, true);
    httpcj.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
    httpcj.send("data=" + encodeURIComponent(JSON.stringify(saveData)) + "&filename=data/data-" + timestamp + ".json");//send text to save-file.php

}

function saveDirt(){
    var httpc = new XMLHttpRequest();
    httpc.open("POST", "save-file.php", true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(JSON.stringify(dirt,null,"    "))+"&filename=dirt.json");//send text to save-file.php    
}


drawPlots();

function drawPlots(){
    plotfiles = [];
    var httpcplots = new XMLHttpRequest();
    httpcplots.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            plotfiles = JSON.parse(this.responseText);
            plots_md = "# plots.md\n\n";
            data_md = "# data.md\n\n";
            
            document.getElementById("plot-feed").innerHTML = "";
            for(var index = plotfiles.length - 1;index >= 0;index--){
                plots_md += "![](plots/" + plotfiles[index] + ")\n\n";
                data_md += " - [data/data." + plotfiles[index].split("-")[1].split('.')[0] + ".json](data/data-" + plotfiles[index].split("-")[1].split('.')[0] + ".json)\n";
                var newimg = document.createElement("IMG");
                newimg.src = "plots/" + plotfiles[index];
                document.getElementById("plot-feed").appendChild(newimg);
            }
            
            var httpcp = new XMLHttpRequest();
            httpcp.open("POST", "save-file.php", true);
            httpcp.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
            httpcp.send("data=" + plots_md + "&filename=plots.md");//send text to save-file.php

            var httpcd = new XMLHttpRequest();
            httpcd.open("POST", "save-file.php", true);
            httpcd.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
            httpcd.send("data=" + data_md + "&filename=data.md");//send text to save-file.php

        }
    };
    httpcplots.open("GET", "list-files.php?directoryname=plots", true);
    httpcplots.send();
}

files = [];
var httpf = new XMLHttpRequest();
httpf.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        files = JSON.parse(this.responseText);
        filesmd = "# files.md\n\n";
        filesmd += "\n## web files\n\n";
        for(var index = 0;index < files.length;index++){
            if(files[index].toLowerCase().endsWith(".html") || files[index].toLowerCase().endsWith(".js") || files[index].toLowerCase().endsWith(".css")){
                filesmd += " - [" + files[index] + "](" + files[index] + ")\n";
            }
        }
        filesmd += "\n## php files\n\n";
        for(var index = 0;index < files.length;index++){
            if(files[index].toLowerCase().endsWith(".php")){
                filesmd += " - [" + files[index] + "](" + files[index] + ")\n";
            }
        }
        filesmd += "\n## markdown files\n\n";
        for(var index = 0;index < files.length;index++){
            if(files[index].toLowerCase().endsWith(".md")){
                filesmd += " - [" + files[index] + "](" + files[index] + ")\n";
            }
        }
        filesmd += "\n## json files\n\n";
        for(var index = 0;index < files.length;index++){
            if(files[index].toLowerCase().endsWith(".json")){
                filesmd += " - [" + files[index] + "](" + files[index] + ")\n";
            }
        }       
        filesmd += "\n## python files\n\n";
        for(var index = 0;index < files.length;index++){
            if(files[index].toLowerCase().endsWith(".py") || files[index].toLowerCase().endsWith(".ipynb")){
                filesmd += " - [" + files[index] + "](" + files[index] + ")\n";
            }
        }        
        
        var httpcm = new XMLHttpRequest();
        httpcm.open("POST", "save-file.php", true);
        httpcm.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
        httpcm.send("data=" + encodeURIComponent(filesmd) + "&filename=files.md");//send text to save-file.php

    }
};
httpf.open("GET", "list-files.php", true);
httpf.send();
</script>
