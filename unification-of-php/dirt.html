phpData = {
    "action":"save",

};


// Universal GET Function
function phpGet({ action, dataType, responseType, payload }) {
    // Structure the control metadata and payload into standard URL query params
    const queryParams = new URLSearchParams({
        action: action,
        dataType: dataType,
        responseType: responseType,
        // If dataType is json, stringify the payload object, otherwise pass as a plain string
        payload: dataType === 'json' ? JSON.stringify(payload) : payload
    });

    return fetch(`dirt.php?${queryParams.toString()}`, { method: 'GET' })
        .then(response => {
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            // Return either parsed JSON or a plain text string based on request
            return responseType === 'json' ? response.json() : response.text();
        });
}

// Universal POST Function
function phpPost({ action, dataType, responseType, payload }) {
    let headers = { 'X-Action': action, 'X-DataType': dataType, 'X-ResponseType': responseType };
    let bodyData;

    if (dataType === 'json') {
        headers['Content-Type'] = 'application/json';
        bodyData = JSON.stringify(payload);
    } else {
        headers['Content-Type'] = 'text/plain';
        bodyData = payload; // Raw text or string string
    }

    return fetch('dirt.php', {
        method: 'POST',
        headers: headers,
        body: bodyData
    })
    .then(response => {
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
        return responseType === 'json' ? response.json() : response.text();
    });
}
